# Stack de observabilidad · Plausible (analytics) + Glitchtip (errores)
#
# Importa este archivo como "Docker Compose" en Coolify y configura los dominios:
#   - analytics.wyweb.es  → puerto 8000 del servicio `plausible`
#   - errors.wyweb.es     → puerto 8000 del servicio `glitchtip`
#
# Variables requeridas en el entorno de Coolify:
#   - PLAUSIBLE_BASE_URL              (ej. https://analytics.wyweb.es)
#   - PLAUSIBLE_SECRET_KEY_BASE       (openssl rand -base64 64)
#   - PLAUSIBLE_TOTP_VAULT_KEY        (openssl rand -base64 32)
#   - GLITCHTIP_SECRET_KEY            (openssl rand -base64 50)
#   - GLITCHTIP_DEFAULT_FROM_EMAIL    (ej. errors@wyweb.es)
#   - GLITCHTIP_EMAIL_URL             (smtp+tls://user:pass@smtp.resend.com:587)
#   - GLITCHTIP_DOMAIN                (https://errors.wyweb.es)

name: wyweb-net-obs

x-restart: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ──────────────────────────────────────────────────────────────────────
  # Plausible (Community Edition v2)
  # ──────────────────────────────────────────────────────────────────────
  plausible-db:
    <<: [*default-restart, *default-logging]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD:?}
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  plausible-events-db:
    <<: [*default-restart, *default-logging]
    image: clickhouse/clickhouse-server:24.12-alpine
    volumes:
      - plausible-events-data:/var/lib/clickhouse
      - plausible-events-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    <<: [*default-restart, *default-logging]
    image: ghcr.io/plausible/community-edition:v2.1
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_started
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL:?}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE:?}
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY:?}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events_db
      DISABLE_REGISTRATION: "invite_only"
      MAILER_EMAIL: ${PLAUSIBLE_FROM_EMAIL:-noreply@wyweb.es}
      SMTP_HOST_ADDR: ${PLAUSIBLE_SMTP_HOST:-smtp.resend.com}
      SMTP_HOST_PORT: ${PLAUSIBLE_SMTP_PORT:-587}
      SMTP_USER_NAME: ${PLAUSIBLE_SMTP_USER:-}
      SMTP_USER_PWD: ${PLAUSIBLE_SMTP_PASSWORD:-}
    # Coolify: expón este servicio en analytics.wyweb.es → port 8000

  # ──────────────────────────────────────────────────────────────────────
  # Glitchtip (Sentry-compatible error tracking)
  # ──────────────────────────────────────────────────────────────────────
  glitchtip-db:
    <<: [*default-restart, *default-logging]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?}
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    <<: [*default-restart, *default-logging]
    image: redis:7-alpine
    volumes:
      - glitchtip-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  glitchtip-web:
    <<: [*default-restart, *default-logging]
    image: glitchtip/glitchtip:latest
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?}
      REDIS_URL: redis://glitchtip-redis:6379/0
      PORT: "8000"
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-errors@wyweb.es}
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
      ENABLE_OPEN_USER_REGISTRATION: "False"
      ENABLE_ORGANIZATION_CREATION: "False"
    # Coolify: expón este servicio en errors.wyweb.es → port 8000

  glitchtip-worker:
    <<: [*default-restart, *default-logging]
    image: glitchtip/glitchtip:latest
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    command: ["./bin/run-celery-with-beat.sh"]
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?}
      REDIS_URL: redis://glitchtip-redis:6379/0
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-errors@wyweb.es}
      CELERY_WORKER_AUTOSCALE: "1,3"

  # ──────────────────────────────────────────────────────────────────────
  # Migraciones one-shot (corre una vez al primer arranque)
  # ──────────────────────────────────────────────────────────────────────
  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    depends_on:
      glitchtip-db:
        condition: service_healthy
    command: ["./manage.py", "migrate"]
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?}
      REDIS_URL: redis://glitchtip-redis:6379/0
    restart: "no"

volumes:
  plausible-db-data:
  plausible-events-data:
  plausible-events-logs:
  glitchtip-db-data:
  glitchtip-redis-data:
