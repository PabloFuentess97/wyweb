# Stack local de Wyweb.net — postgres, redis, minio + (opcional) la app.
#
# Uso típico:
#   docker compose up -d                 → solo servicios (db, redis, minio)
#                                          la app se ejecuta localmente con `pnpm dev`
#   docker compose --profile app up -d   → arranca también la app empaquetada
#                                          (replica del entorno productivo)
#
# Requiere un .env en la raíz con AUTH_SECRET, RESEND_API_KEY, etc.
# DATABASE_URL/REDIS_URL/S3_* se sobreescriben aquí para apuntar a los servicios.

name: wyweb-net

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wyweb
      POSTGRES_PASSWORD: uxea_dev_pwd
      POSTGRES_DB: wyweb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uxea -d uxea_net"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Consola web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Init job: crea el bucket si no existe y le da política public-read selectiva
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb -p local/wyweb-net || true &&
      echo '✓ Bucket wyweb-net listo';
      "
    restart: "no"

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://wyweb:uxea_dev_pwd@db:5432/wyweb
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
      S3_BUCKET: wyweb-net
      S3_PUBLIC_URL: http://localhost:9000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # AUTH_SECRET, RESEND_API_KEY, EMAIL_FROM, etc. desde .env
      AUTH_SECRET: ${AUTH_SECRET:?Falta AUTH_SECRET en .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Wyweb <noreply@wyweb.net>}
      EMAIL_TO_LEADS: ${EMAIL_TO_LEADS:-info@wyweb.net}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-self-built}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL:-https://github.com/PabloFuentess97/wyweb}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
  minio-data:
